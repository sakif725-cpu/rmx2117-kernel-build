name: Build Realme RMX2117 Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libssl-dev bc liblz4-tool make kmod libncurses5-dev

      - name: Setup Compiler Cache (ccache)
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-kernel-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-kernel-ccache-

      - name: Clone Kernel Source
        run: |
          git clone --recurse-submodules https://github.com/realme-mediatek-dev/android_kernel_realme_mt6853.git -b android-12.0 kernel

      - name: Clone Toolchain (Clang)
        run: |
          git clone https://github.com/ZyCromerZ/Clang.git --depth=1 -b 14 ${{ github.workspace }}/clang-llvm

      - name: Clone AnyKernel3 Template
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 anykernel

      - name: Inject APatch Fixes into Defconfig
        run: |
          cd kernel
          DEFCONFIG="arch/arm64/configs/k6853v1_64_defconfig"
          echo "" >> $DEFCONFIG
          echo "CONFIG_KALLSYMS=y" >> $DEFCONFIG
          echo "CONFIG_KALLSYMS_ALL=y" >> $DEFCONFIG
          echo "CONFIG_DEBUG_KERNEL=y" >> $DEFCONFIG
          sed -i 's/CONFIG_STRIP_ASM_SYMS=y/# CONFIG_STRIP_ASM_SYMS is not set/g' $DEFCONFIG
          sed -i 's/CONFIG_KALLSYMS_STRIP_NAMES=y/# CONFIG_KALLSYMS_STRIP_NAMES is not set/g' $DEFCONFIG

      - name: Compile Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export O=out
          
          # Setup Toolchain
          TC_DIR="${{ github.workspace }}/clang-llvm/bin"
          export PATH="${TC_DIR}:${PATH}"
          
          # Setup ccache parameters
          export CCACHE_DIR="${HOME}/.ccache"
          ccache -M 10G
          
          echo "Executing self-healing configuration engine..."
          while true; do
            # Temporarily disable GitHub Actions strict error crashing
            set +e
            
            # Run defconfig generation and capture output
            BUILD_LOG=$(make O=out k6853v1_64_defconfig 2>&1)
            BUILD_STATUS=$?
            
            # Re-enable strict error crashing
            set -e
            
            if [ $BUILD_STATUS -eq 0 ]; then
              echo "Defconfig generated successfully!"
              break
            fi
            
            # Check if failure is due to a missing Kconfig include target
            if echo "$BUILD_LOG" | grep -q "can't open file"; then
              MISSING_FILE=$(echo "$BUILD_LOG" | grep "can't open file" | sed -e 's/.*can'\''t open file "//' -e 's/"//')
              TARGET_DIR="$(dirname "$MISSING_FILE")"
              
              echo "-> Detected missing configuration target: $MISSING_FILE"
              echo "-> Dynamic resolution: Clearing path structural blockages..."
              
              # Safely trace the path segments from left to right and destroy non-directory blockers
              CURRENT_PATH=""
              IFS='/' read -r -a segments <<< "$TARGET_DIR"
              for segment in "${segments[@]}"; do
                if [ -z "$CURRENT_PATH" ]; then
                  CURRENT_PATH="$segment"
                else
                  CURRENT_PATH="$CURRENT_PATH/$segment"
                fi
                
                if [ -e "$CURRENT_PATH" ] || [ -L "$CURRENT_PATH" ]; then
                  if [ ! -d "$CURRENT_PATH" ]; then
                    echo "   [Bulldozer] Removing blocking non-directory file: $CURRENT_PATH"
                    rm -f "$CURRENT_PATH"
                  fi
                fi
              done
              
              # Create clean structure and dummy files safely
              mkdir -p "$TARGET_DIR"
              touch "$MISSING_FILE"
              
              # Only create a dummy Makefile if we are inside a subfolder to protect root files
              if [ "$TARGET_DIR" != "." ]; then
                touch "$TARGET_DIR/Makefile"
              fi
            else
              echo "Defconfig engine hit an unresolvable structural error:"
              echo "$BUILD_LOG"
              exit $BUILD_STATUS
            fi
          done
          
          echo "Starting Core Kernel Compilation with Warning Shields..."
          
          # Compile using ccache wrapped toolchain binaries with LLVM Linkers and warning overrides
          make -j$(nproc) O=out \
            CC="ccache clang" \
            LD="ld.lld" \
            AR="llvm-ar" \
            NM="llvm-nm" \
            OBJCOPY="llvm-objcopy" \
            OBJDUMP="llvm-objdump" \
            STRIP="llvm-strip" \
            LLVM=1 \
            LLVM_IAS=0 \
            CROSS_COMPILE="${TC_DIR}/aarch64-linux-gnu-" \
            CROSS_COMPILE_ARM32="${TC_DIR}/arm-linux-gnueabi-" \
            KCFLAGS="-Wno-error -Wno-implicit-function-declaration -Wno-mismatched-return-types -Wno-format"
            
          # Print cache stats to terminal logs
          ccache -s

      - name: Package with AnyKernel3
        run: |
          if [ -f kernel/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel/out/arch/arm64/boot/Image.gz-dtb anykernel/
          elif [ -f kernel/out/arch/arm64/boot/Image.gz ]; then
            cp kernel/out/arch/arm64/boot/Image.gz anykernel/
          else
            cp kernel/out/arch/arm64/boot/Image anykernel/
          fi
          
          cd anykernel
          sed -i 's/device.name1=generic/device.name1=RMX2117/g' anykernel.sh
          zip -r ../APatch_Supported_Kernel_RMX2117.zip *

      - name: Upload Flashable ZIP to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: APatch_Kernel_RMX2117
          path: APatch_Supported_Kernel_RMX2117.zip
