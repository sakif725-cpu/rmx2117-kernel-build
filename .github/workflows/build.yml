name: Build Realme RMX2117 Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # Added gcc-aarch64-linux-gnu and gcc-arm-linux-gnueabi to provide the fallback assemblers for LLVM_IAS=0
          sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libssl-dev bc liblz4-tool make kmod libncurses5-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone Kernel Source
        run: |
          git clone https://github.com/realme-mediatek-dev/android_kernel_realme_mt6853.git -b android-12.0 kernel
          
      - name: Clone Toolchain (Clang)
        run: |
          git clone https://github.com/ZyCromerZ/Clang.git --depth=1 -b 14 ${{ github.workspace }}/clang-llvm

      - name: Clone AnyKernel3 Template
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 anykernel

      - name: Inject APatch Fixes into Defconfig
        run: |
          cd kernel
          DEFCONFIG="arch/arm64/configs/k6853v1_64_defconfig"
          echo "" >> $DEFCONFIG
          echo "CONFIG_KALLSYMS=y" >> $DEFCONFIG
          echo "CONFIG_KALLSYMS_ALL=y" >> $DEFCONFIG
          echo "CONFIG_DEBUG_KERNEL=y" >> $DEFCONFIG
          sed -i 's/CONFIG_STRIP_ASM_SYMS=y/# CONFIG_STRIP_ASM_SYMS is not set/g' $DEFCONFIG
          sed -i 's/CONFIG_KALLSYMS_STRIP_NAMES=y/# CONFIG_KALLSYMS_STRIP_NAMES is not set/g' $DEFCONFIG

      - name: Compile Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export O=out
          export PATH="${{ github.workspace }}/clang-llvm/bin:${PATH}"
          
          make O=out k6853v1_64_defconfig
          
          # Using dynamic threads. GNU fallback assembler will successfully bridge through system paths now
          make -j$(nproc) O=out \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=0 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Package with AnyKernel3
        run: |
          if [ -f kernel/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel/out/arch/arm64/boot/Image.gz-dtb anykernel/
          elif [ -f kernel/out/arch/arm64/boot/Image.gz ]; then
            cp kernel/out/arch/arm64/boot/Image.gz anykernel/
          else
            cp kernel/out/arch/arm64/boot/Image anykernel/
          fi
          
          cd anykernel
          sed -i 's/device.name1=generic/device.name1=RMX2117/g' anykernel.sh
          zip -r ../APatch_Supported_Kernel_RMX2117.zip *

      - name: Upload Flashable ZIP to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: APatch_Kernel_RMX2117
          path: APatch_Supported_Kernel_RMX2117.zip
